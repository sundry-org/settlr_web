<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found – Settlr</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f13;
            color: #f5f5f7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
        }

        h1 {
            font-size: 5rem;
            font-weight: 800;
            color: #27272a;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        p {
            color: #71717a;
            margin-bottom: 32px;
        }

        a {
            display: inline-block;
            background: #6366f1;
            color: #fff;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        a:hover {
            background: #4f46e5;
        }
    </style>
</head>

<body>
    <h1>404</h1>
    <h2>Page not found</h2>
    <p>The link you followed may be broken or the page may have moved.</p>
    <a href="/">Go to Settlr home</a>
</body>

</html>
